<!-- TopNavBar Shell -->
<nav class="nav">
  <div class="nav__container">
    <a routerLink="/" class="nav__logo">
      <img src="assets/logo.png" alt="Exeter 501 Darts Club" class="nav__logo-img" />
    </a>
    
    <!-- Desktop Navigation -->
    <div class="nav__links">
      <a routerLink="/" class="nav-link" routerLinkActive="nav-link--active">Home</a>
      <a routerLink="/about" class="nav-link" routerLinkActive="nav-link--active">About Us</a>
      <a href="mailto:hello@exeter501dartsclub.co.uk" class="nav-link">Contact Us</a>
    </div>
    
    <div class="nav__actions">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSevmGKDQwNwFMK7YuWbq4bSM1LdyWRzRHnWZlAcKv01gHcNTQ/viewform?usp=send_form" target="_blank" rel="noopener" class="btn btn--primary">Join Us</a>
    </div>
    
    <!-- Mobile Menu Button -->
    <button 
      class="nav__burger" 
      (click)="toggleMobileMenu()" 
      [attr.aria-expanded]="isMobileMenuOpen()"
      [attr.aria-label]="isMobileMenuOpen() ? 'Close menu' : 'Open menu'"
      type="button"
    >
      <span class="nav__burger-line"></span>
      <span class="nav__burger-line"></span>
      <span class="nav__burger-line"></span>
    </button>
    
    <!-- Mobile Menu Overlay -->
    @if (isMobileMenuOpen()) {
      <div class="nav__mobile-overlay" (click)="closeMobileMenu()"></div>
    }
    
    <!-- Mobile Menu -->
    <div class="nav__mobile" [class.nav__mobile--open]="isMobileMenuOpen()">
      <div class="nav__mobile-links">
        <a routerLink="/" class="nav__mobile-link" routerLinkActive="nav__mobile-link--active" (click)="closeMobileMenu()">Home</a>
        <a routerLink="/about" class="nav__mobile-link" routerLinkActive="nav__mobile-link--active" (click)="closeMobileMenu()">About Us</a>
        <a href="mailto:hello@exeter501dartsclub.co.uk" class="nav__mobile-link" (click)="closeMobileMenu()">Contact Us</a>
      </div>
      <div class="nav__mobile-cta">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSevmGKDQwNwFMK7YuWbq4bSM1LdyWRzRHnWZlAcKv01gHcNTQ/viewform?usp=send_form" target="_blank" rel="noopener" class="btn btn--primary btn--block">Join Us</a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main">
  <router-outlet />

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__container">
      <div class="footer__brand">
        <span class="footer__logo">DARTs Academy</span>
        <span class="footer__copyright">© 2026 501 Darts Club. All rights reserved.</span>
      </div>
      <div class="footer__links">
        <a routerLink="/" class="footer__link">Home</a>
        <a routerLink="/about" class="footer__link">About</a>
        <a href="mailto:hello@exeter501dartsclub.co.uk" class="footer__link">Contact</a>
        <a routerLink="/privacy" class="footer__link">Privacy</a>
      </div>
    </div>
  </footer>
</main>
